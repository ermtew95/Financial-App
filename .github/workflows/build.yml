name: Build Desktop Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile main.py
          python -m py_compile database.py
          python -m py_compile charts.py
          python -m py_compile calculations.py

  build:
    name: Build artifact on ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: FutureBudget-windows
            add_data_arg: data;data
          - os: macos-latest
            artifact_name: FutureBudget-macos
            add_data_arg: data:data

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Build desktop bundle
        run: >
          pyinstaller
          --noconfirm
          --clean
          --windowed
          --onedir
          --name FutureBudget
          --add-data "${{ matrix.add_data_arg }}"
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/FutureBudget
          if-no-files-found: error
